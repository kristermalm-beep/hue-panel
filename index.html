<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hue Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0f14; --surface: #1a1a24; --surface2: #22222f;
  --border: rgba(255,255,255,0.08); --text: #f0efff;
  --muted: #7b7a9a; --accent: #f5a623; --radius: 14px;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,sans-serif; font-size:14px; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

.header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px 6px; border-bottom:1px solid var(--border); flex-shrink:0; }
.header h1 { font-size:16px; font-weight:600; }
.icon-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; }

.tabs { display:flex; gap:4px; padding:7px 14px; flex-shrink:0; }
.tab { flex:1; padding:6px 4px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:12px; font-weight:500; cursor:pointer; text-align:center; transition:all 0.15s; }
.tab.active { background:var(--accent); border-color:var(--accent); color:#1a0e00; }

.content { flex:1; overflow-y:auto; padding:6px 14px 14px; }
.content::-webkit-scrollbar { display:none; }

.light-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:11px 13px; margin-bottom:7px; }
.light-row { display:flex; align-items:center; gap:10px; }
.light-icon { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:background 0.3s; }
.light-name { font-weight:500; font-size:13px; flex:1; line-height:1.3; }
.light-status { font-size:11px; color:var(--muted); }
.unreachable { opacity:0.45; }

.toggle { position:relative; width:42px; height:23px; flex-shrink:0; cursor:pointer; }
.toggle input { display:none; }
.toggle-track { position:absolute; inset:0; background:#3a3a55; border-radius:12px; transition:background 0.2s; }
.toggle input:checked ~ .toggle-track { background:var(--accent); }
.toggle-thumb { position:absolute; top:3px; left:3px; width:17px; height:17px; background:#fff; border-radius:50%; transition:transform 0.2s; pointer-events:none; }
.toggle input:checked ~ .toggle-thumb { transform:translateX(19px); }

.bri-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.bri-icon { font-size:12px; color:var(--muted); }
input[type=range] { flex:1; -webkit-appearance:none; height:4px; border-radius:2px; background:var(--surface2); outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent); cursor:pointer; }
.bri-val { font-size:11px; color:var(--muted); width:28px; text-align:right; }

.color-row { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
.cswatch { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.1s; flex-shrink:0; }
.cswatch:active { transform:scale(1.2); }

.group-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 13px; margin-bottom:7px; display:flex; align-items:center; gap:10px; }
.group-card.on { border-color:rgba(245,166,35,0.35); }
.group-icon { font-size:20px; flex-shrink:0; }
.group-info { flex:1; }
.group-name { font-weight:500; font-size:13px; }
.group-sub { font-size:11px; color:var(--muted); margin-top:2px; }

.scene-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:4px; }
.scene-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; cursor:pointer; transition:all 0.15s; }
.scene-card:active { transform:scale(0.97); background:var(--surface2); }
.scene-icon { font-size:20px; margin-bottom:4px; }
.scene-name { font-size:12px; font-weight:500; }
.scene-room { font-size:11px; color:var(--muted); margin-top:2px; }

.status-bar { padding:5px 14px; font-size:11px; color:var(--muted); border-top:1px solid var(--border); display:flex; align-items:center; gap:6px; flex-shrink:0; }
.sdot { width:6px; height:6px; border-radius:50%; background:#4caf50; flex-shrink:0; }
.sdot.err { background:#e53935; } .sdot.warn { background:#ff9800; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:flex-end; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:18px 18px 0 0; padding:18px 16px; width:100%; }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 14px; }
.modal-title { font-size:15px; font-weight:600; margin-bottom:14px; }
.hue-swatches { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.hswatch { width:34px; height:34px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:transform 0.1s; }
.hswatch.sel { border-color:#fff; transform:scale(1.15); }
.modal-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.modal-label { font-size:12px; color:var(--muted); width:55px; flex-shrink:0; }

.spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading { display:flex; align-items:center; gap:10px; padding:20px; color:var(--muted); font-size:13px; }
.empty { color:var(--muted); font-size:13px; padding:20px; text-align:center; }
</style>
</head>
<body>

<div class="header">
  <h1>💡 Hue Panel</h1>
  <div style="display:flex;gap:6px">
    <div class="icon-btn" onclick="refreshAll()">↻</div>
    <div class="icon-btn" onclick="openSettings()">⚙</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('lights',this)">Lampor</div>
  <div class="tab" onclick="switchTab('groups',this)">Rum</div>
  <div class="tab" onclick="switchTab('scenes',this)">Scener</div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>Ansluter…</div>
</div>

<div class="status-bar">
  <div class="sdot" id="sdot"></div>
  <span id="stext">Ansluter…</span>
</div>

<div class="modal-overlay" id="cmodal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-name"></div>
    <div class="hue-swatches" id="hswatches"></div>
    <div class="modal-row">
      <span class="modal-label">☀ Styrka</span>
      <input type="range" id="mbri" min="1" max="254" value="200" oninput="mBri(this.value)">
      <span class="bri-val" id="mbri-v"></span>
    </div>
    <div class="modal-row">
      <span class="modal-label">🌡 Färgton</span>
      <input type="range" id="mct" min="153" max="500" value="300" oninput="mCt(this.value)">
      <span class="bri-val" id="mct-v"></span>
    </div>
  </div>
</div>

<script>
let BRIDGE = localStorage.getItem('hue_ip')  || '192.168.172.133';
let KEY    = localStorage.getItem('hue_key') || '';
let lights = {}, currentTab = 'lights', modalLightId = null;

const PRESETS = [
  { name:'Vit',    hex:'#fff9f0', ct:300 },
  { name:'Varm',   hex:'#ffd080', ct:450 },
  { name:'Kall',   hex:'#cce8ff', ct:153 },
  { name:'Röd',    hex:'#ff3333', xy:[0.674,0.322] },
  { name:'Grön',   hex:'#33cc44', xy:[0.17,0.70]   },
  { name:'Blå',    hex:'#3366ff', xy:[0.136,0.04]  },
  { name:'Lila',   hex:'#9933ff', xy:[0.27,0.11]   },
  { name:'Rosa',   hex:'#ff55aa', xy:[0.44,0.19]   },
  { name:'Gul',    hex:'#ffee00', xy:[0.44,0.47]   },
  { name:'Orange', hex:'#ff8800', xy:[0.60,0.37]   },
  { name:'Turkos', hex:'#00ddcc', xy:[0.17,0.35]   },
  { name:'Indigo', hex:'#5544cc', xy:[0.20,0.08]   },
];

const ROOMS = {
  'Kök':        { lights:['4','5','7','9','11','12','13','14'], icon:'🍳' },
  'Vardagsrum': { lights:['15','16','17','18','19','20','21','22'], icon:'🛋' },
  'Valerie':    { lights:['1','2','3'], icon:'✨' },
  'Hector':     { lights:['6','8','10'], icon:'🎯' },
  'Badrum':     { lights:['24','25','26','27','28','29'], icon:'🚿' },
  'Övrigt':     { lights:['17','23','30'], icon:'🔌' },
};

const SCENES = [
  { id:'relax',   name:'Avkoppling',  icon:'😌', room:'Vardagsrum', ct:450, bri:80  },
  { id:'energy',  name:'Energi',      icon:'⚡', room:'Kök',        ct:153, bri:254 },
  { id:'read',    name:'Läsning',     icon:'📖', room:'Vardagsrum', ct:300, bri:200 },
  { id:'night',   name:'Nattläge',    icon:'🌙', room:'Vardagsrum', ct:500, bri:25  },
  { id:'bright',  name:'Max ljus',    icon:'☀️', room:'Kök',        ct:250, bri:254 },
  { id:'sunset',  name:'Solnedgång',  icon:'🌅', room:'Vardagsrum', xy:[0.60,0.37], bri:150 },
  { id:'focus',   name:'Fokus',       icon:'🎯', room:'Kök',        ct:200, bri:220 },
  { id:'movie',   name:'Film',        icon:'🎬', room:'Vardagsrum', ct:500, bri:35  },
  { id:'bathday', name:'Morgon bad',  icon:'🛁', room:'Badrum',     ct:250, bri:200 },
  { id:'bathngt', name:'Badrum natt', icon:'🌛', room:'Badrum',     ct:500, bri:30  },
];

// ── API ──
async function api(method, path, body) {
  const r = await fetch(`http://${BRIDGE}/api/${KEY}${path}`, {
    method,
    headers: {'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

async function refreshAll() {
  setStatus(null,'Uppdaterar…');
  try {
    const data = await api('GET','/lights');
    if (Array.isArray(data)) throw new Error(data[0]?.error?.description || 'API-fel');
    lights = data;
    const onCount = Object.values(lights).filter(l=>l.state.on).length;
    setStatus(true,`${Object.keys(lights).length} lampor · ${onCount} tända`);
    renderTab();
  } catch(e) {
    setStatus(false,'Fel: '+e.message);
    document.getElementById('content').innerHTML = `<div class="empty">❌ ${e.message}<br><small>Kontrollera IP och API-nyckel via ⚙</small></div>`;
  }
}

async function setLight(id, body) {
  try {
    await api('PUT',`/lights/${id}/state`, body);
    Object.assign(lights[id].state, body);
    renderTab();
  } catch(e) { setStatus(false,'Fel: '+e.message); }
}

async function setRoom(name, body) {
  const ids = (ROOMS[name]?.lights || []).filter(id=>lights[id]);
  try {
    await Promise.all(ids.map(id => api('PUT',`/lights/${id}/state`, body)));
    ids.forEach(id => Object.assign(lights[id].state, body));
    renderTab();
  } catch(e) { setStatus(false,'Fel: '+e.message); }
}

async function activateScene(sc) {
  const ids = (ROOMS[sc.room]?.lights || []).filter(id=>lights[id]);
  const body = { on:true, bri:sc.bri, transitiontime:10 };
  if (sc.ct)  body.ct = sc.ct;
  if (sc.xy)  body.xy = sc.xy;
  try {
    await Promise.all(ids.map(id => api('PUT',`/lights/${id}/state`, body)));
    ids.forEach(id => Object.assign(lights[id].state, body));
    setStatus(true,`"${sc.name}" aktiverad`);
    renderTab();
  } catch(e) { setStatus(false,'Fel: '+e.message); }
}

// ── Render ──
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}

function renderTab() {
  const c = document.getElementById('content');
  if      (currentTab==='lights') c.innerHTML = renderLights();
  else if (currentTab==='groups') c.innerHTML = renderGroups();
  else                            c.innerHTML = renderScenes();
}

function renderLights() {
  const ids = Object.keys(lights).sort((a,b)=>+a-+b);
  return ids.map(id => {
    const l = lights[id], s = l.state;
    const on = s.on, reach = s.reachable !== false;
    const bri = s.bri || 1, pct = Math.round(bri/254*100);
    const isPlug = l.type==='On/Off plug-in unit' || l.type==='Dimmable light';
    const bg = on && reach ? lightColor(s) : 'var(--surface2)';
    const icon = !reach ? '⚠️' : on ? '💡' : '⬛';
    return `<div class="light-card ${!reach?'unreachable':''}">
      <div class="light-row">
        <div class="light-icon" style="background:${bg}">${icon}</div>
        <div style="flex:1;min-width:0">
          <div class="light-name">${l.name}</div>
          <div class="light-status">${!reach?'Ej nåbar':on?pct+'%':' Av'}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${on?'checked':''} onchange="setLight('${id}',{on:this.checked})">
          <div class="toggle-track"></div><div class="toggle-thumb"></div>
        </label>
      </div>
      ${on && !isPlug ? `
      <div class="bri-row">
        <span class="bri-icon">☀</span>
        <input type="range" min="1" max="254" value="${bri}"
          oninput="setLight('${id}',{bri:+this.value})"
          style="background:linear-gradient(to right,var(--accent) ${pct}%,var(--surface2) ${pct}%)">
        <span class="bri-val">${pct}%</span>
      </div>
      <div class="color-row">
        ${PRESETS.slice(0,6).map((p,i)=>`<div class="cswatch" style="background:${p.hex}" onclick="applyPreset('${id}',${i})" title="${p.name}"></div>`).join('')}
        <div class="cswatch" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)" onclick="openModal('${id}')" title="Fler färger"></div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderGroups() {
  return Object.entries(ROOMS).map(([name, g]) => {
    const valid = g.lights.filter(id=>lights[id]);
    const onC = valid.filter(id=>lights[id].state.on).length;
    return `<div class="group-card ${onC>0?'on':''}">
      <div class="group-icon">${g.icon}</div>
      <div class="group-info">
        <div class="group-name">${name}</div>
        <div class="group-sub">${valid.length} lampor · ${onC} tända</div>
      </div>
      <label class="toggle">
        <input type="checkbox" ${onC>0?'checked':''} onchange="setRoom('${name}',{on:this.checked})">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
    </div>`;
  }).join('');
}

function renderScenes() {
  return `<div class="scene-grid">${SCENES.map(sc=>`
    <div class="scene-card" onclick='activateScene(${JSON.stringify(sc)})'>
      <div class="scene-icon">${sc.icon}</div>
      <div class="scene-name">${sc.name}</div>
      <div class="scene-room">${sc.room}</div>
    </div>`).join('')}</div>`;
}

// ── Colors ──
function lightColor(s) {
  if (s.colormode==='ct' && s.ct) {
    const t=(s.ct-153)/347;
    return `rgba(${Math.round(255-t*80)},${Math.round(220-t*50)},${Math.round(180+t*40)},0.75)`;
  }
  if (s.xy) {
    const [x,y]=s.xy, z=1-x-y, Y=0.6, X=(Y/y)*x, Z=(Y/y)*z;
    let r=X*1.656492-Y*0.354851-Z*0.255038;
    let g=-X*0.707196+Y*1.655397+Z*0.036152;
    let b=X*0.051713-Y*0.121364+Z*1.011530;
    const m=Math.max(r,g,b,1);
    return `rgba(${Math.round(r/m*255)},${Math.round(Math.max(0,g/m*255))},${Math.round(Math.max(0,b/m*255))},0.75)`;
  }
  return 'rgba(245,166,35,0.75)';
}

function applyPreset(id,i) {
  const p=PRESETS[i], b={on:true};
  if(p.ct) b.ct=p.ct; else b.xy=p.xy;
  setLight(id,b);
}

// ── Modal ──
function openModal(id) {
  modalLightId=id;
  const s=lights[id].state;
  document.getElementById('modal-name').textContent=lights[id].name;
  document.getElementById('mbri').value=s.bri||200;
  document.getElementById('mbri-v').textContent=Math.round((s.bri||200)/254*100)+'%';
  document.getElementById('mct').value=s.ct||300;
  ctLabel(s.ct||300);
  document.getElementById('cmodal').classList.add('open');
}
function closeModal(){ document.getElementById('cmodal').classList.remove('open'); }
function mPickColor(i){
  document.querySelectorAll('.hswatch').forEach((s,j)=>s.classList.toggle('sel',i===j));
  const p=PRESETS[i],b={on:true};
  if(p.ct)b.ct=p.ct; else b.xy=p.xy;
  if(modalLightId)setLight(modalLightId,b);
}
function mBri(v){ document.getElementById('mbri-v').textContent=Math.round(v/254*100)+'%'; if(modalLightId)setLight(modalLightId,{bri:+v}); }
function mCt(v){ ctLabel(+v); if(modalLightId)setLight(modalLightId,{ct:+v,colormode:'ct'}); }
function ctLabel(ct){ document.getElementById('mct-v').textContent=ct<200?'Kall':ct<320?'Neutral':ct<420?'Varm':'Glöd'; }

// ── Status ──
function setStatus(ok,msg){
  document.getElementById('stext').textContent=msg;
  document.getElementById('sdot').className='sdot'+(ok===false?' err':ok===null?' warn':'');
}

// ── Settings ──
function openSettings(){
  const ip=prompt('Bryggans IP:',BRIDGE); if(!ip)return;
  const key=prompt('API-nyckel:',KEY); if(!key)return;
  BRIDGE=ip; KEY=key;
  localStorage.setItem('hue_ip',ip); localStorage.setItem('hue_key',key);
  refreshAll();
}

// ── Init ──
document.getElementById('hswatches').innerHTML=PRESETS.map((p,i)=>
  `<div class="hswatch" style="background:${p.hex}" onclick="mPickColor(${i})" title="${p.name}"></div>`
).join('');

if(!KEY){
  setStatus(false,'Saknar API-nyckel');
  document.getElementById('content').innerHTML='<div class="empty">Tryck ⚙ och ange din API-nyckel.<br><br>IP är redan inställd på<br><code style="color:var(--accent)">192.168.172.133</code></div>';
} else {
  refreshAll();
}
</script>
</body>
</html>
