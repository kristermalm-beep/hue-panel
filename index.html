<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hue</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --surface3: #242433;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #f5f5f8;
  --text2: #8888a0;
  --text3: #55556a;
  --accent: #f0a500;
  --accent2: rgba(240,165,0,0.15);
  --on: #f0a500;
  --radius: 18px;
  --radius-sm: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 15px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  letter-spacing: -0.01em;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 10px;
  flex-shrink: 0;
}
.header-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.04em;
  color: var(--text);
}
.header-title span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--text2);
  transition: all 0.15s;
}
.icon-btn:active { transform: scale(0.94); background: var(--surface3); }

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 10px 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text3);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.01em;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a0e00;
  font-weight: 600;
}

/* ── Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 20px;
  -webkit-overflow-scrolling: touch;
}
.content::-webkit-scrollbar { display: none; }

/* ── Light card ── */
.light-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.light-card.is-on { border-color: rgba(240,165,0,0.25); }
.light-row { display: flex; align-items: center; gap: 14px; }

.light-dot {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  transition: all 0.3s;
}

.light-info { flex: 1; min-width: 0; }
.light-name {
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.light-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0;
}

/* Toggle */
.toggle { position: relative; width: 50px; height: 28px; flex-shrink: 0; cursor: pointer; }
.toggle input { display: none; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--surface3);
  border-radius: 14px;
  border: 1px solid var(--border2);
  transition: all 0.25s;
}
.toggle input:checked ~ .toggle-track {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 22px; height: 22px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(22px); }

/* Brightness */
.bri-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.bri-icon { font-size: 13px; color: var(--text3); }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--surface3);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 0 4px var(--accent2);
}
.bri-pct {
  font-size: 12px;
  color: var(--text2);
  width: 32px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Colors */
.color-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 12px;
}
.cswatch {
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.cswatch:active { transform: scale(1.25); }

/* ── Group cards ── */
.group-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.group-card.on { border-color: rgba(240,165,0,0.25); }
.group-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 18px;
  cursor: pointer;
}
.group-emoji {
  font-size: 24px;
  width: 44px; height: 44px;
  background: var(--surface2);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.group-info { flex: 1; }
.group-name {
  font-weight: 500;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.group-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 3px;
}
.group-chevron {
  font-size: 12px;
  color: var(--text3);
  transition: transform 0.25s;
  flex-shrink: 0;
}
.group-card.expanded .group-chevron { transform: rotate(180deg); }
.group-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}
.group-card.expanded .group-body { display: block; }
.group-bri-row {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 0 12px;
}
.group-scenes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.group-scene-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.group-scene-btn:active { transform: scale(0.96); background: var(--surface3); }
.group-scene-icon { font-size: 16px; flex-shrink: 0; }
.group-scene-name { font-size: 12px; font-weight: 500; letter-spacing: -0.01em; }

/* ── Scenes ── */
.scene-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.scene-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.scene-card:active { transform: scale(0.96); background: var(--surface2); }
.scene-icon { font-size: 24px; margin-bottom: 10px; }
.scene-name {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.scene-room {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: 0;
}

/* ── Status ── */
.status-bar {
  padding: 8px 20px;
  font-size: 11px;
  color: var(--text3);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  letter-spacing: 0;
}
.sdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #4caf50;
  flex-shrink: 0;
}
.sdot.err { background: #e53935; }
.sdot.warn { background: #ff9800; }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 32px;
  width: 100%;
  border-top: 1px solid var(--border2);
}
.modal-handle {
  width: 32px; height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.modal-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}
.hue-swatches {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 18px;
}
.hswatch {
  width: 38px; height: 38px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform 0.15s;
}
.hswatch.sel { border-color: #fff; transform: scale(1.18); }
.modal-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.modal-label {
  font-size: 12px;
  color: var(--text2);
  width: 58px;
  flex-shrink: 0;
  letter-spacing: 0;
}

.unreachable { opacity: 0.4; }

.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--surface3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading {
  display: flex; align-items: center; gap: 12px;
  padding: 24px; color: var(--text3); font-size: 14px;
}
.empty {
  color: var(--text3); font-size: 14px;
  padding: 24px; text-align: center; line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Hue<span>.</span></div>
  <div class="header-actions">
    <div class="icon-btn" onclick="refreshAll()">↻</div>
    <div class="icon-btn" onclick="openSettings()">⚙</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('lights',this)">Lampor</div>
  <div class="tab" onclick="switchTab('groups',this)">Rum</div>
  <div class="tab" onclick="switchTab('scenes',this)">Scener</div>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>Ansluter…</div>
</div>

<div class="status-bar">
  <div class="sdot" id="sdot"></div>
  <span id="stext">Ansluter…</span>
</div>

<div class="modal-overlay" id="cmodal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-name"></div>
    <div class="hue-swatches" id="hswatches"></div>
    <div class="modal-row">
      <span class="modal-label">☀ Styrka</span>
      <input type="range" id="mbri" min="1" max="254" value="200" oninput="mBri(this.value)">
      <span class="bri-pct" id="mbri-v"></span>
    </div>
    <div class="modal-row">
      <span class="modal-label">🌡 Färgton</span>
      <input type="range" id="mct" min="153" max="500" value="300" oninput="mCt(this.value)">
      <span class="bri-pct" id="mct-v"></span>
    </div>
  </div>
</div>

<script>
let BRIDGE = localStorage.getItem('hue_ip')  || '192.168.172.133';
let KEY    = localStorage.getItem('hue_key') || 'QKli4duV782xNupy1JaDq7QQnQhDc3Srazaji9iX';
let lights = {}, bridgeGroups = {}, bridgeScenes = {};
let currentTab = 'lights', modalLightId = null, modalRoomName = null;

const PRESETS = [
  { name:'Vit',    hex:'#fff9f0', ct:300 },
  { name:'Varm',   hex:'#ffd080', ct:450 },
  { name:'Kall',   hex:'#cce8ff', ct:153 },
  { name:'Röd',    hex:'#ff4444', xy:[0.674,0.322] },
  { name:'Grön',   hex:'#44cc55', xy:[0.17,0.70]   },
  { name:'Blå',    hex:'#4477ff', xy:[0.136,0.04]  },
  { name:'Lila',   hex:'#aa44ff', xy:[0.27,0.11]   },
  { name:'Rosa',   hex:'#ff66bb', xy:[0.44,0.19]   },
  { name:'Gul',    hex:'#ffee00', xy:[0.44,0.47]   },
  { name:'Orange', hex:'#ff8800', xy:[0.60,0.37]   },
  { name:'Turkos', hex:'#00ddcc', xy:[0.17,0.35]   },
  { name:'Indigo', hex:'#6655cc', xy:[0.20,0.08]   },
];

const ROOMS = {
  'Kök':        { lights:['4','5','7','9','11','12','13','14'], icon:'🍳' },
  'Vardagsrum': { lights:['15','16','17','19','20','21','22'], icon:'🛋' },
  'Sovrum':     { lights:['18'], icon:'🛏' },
  'Valerie':    { lights:['1','2','3'], icon:'✨' },
  'Hector':     { lights:['6','8','10'], icon:'🎯' },
  'Badrum':     { lights:['24','25','26','27','28','29'], icon:'🚿' },
  'Övrigt':     { lights:['17','23','30'], icon:'🔌' },
};

const SCENES = [
  { id:'relax',    name:'Avkoppling',  icon:'😌', room:'Vardagsrum', ct:450, bri:80  },
  { id:'energy',   name:'Energi',      icon:'⚡', room:'Kök',        ct:153, bri:254 },
  { id:'read',     name:'Läsning',     icon:'📖', room:'Vardagsrum', ct:300, bri:200 },
  { id:'night',    name:'Nattläge',    icon:'🌙', room:'Vardagsrum', ct:500, bri:25  },
  { id:'bright',   name:'Max ljus',    icon:'☀️', room:'Kök',        ct:250, bri:254 },
  { id:'sunset',   name:'Solnedgång',  icon:'🌅', room:'Vardagsrum', xy:[0.60,0.37], bri:150 },
  { id:'focus',    name:'Fokus',       icon:'🎯', room:'Kök',        ct:200, bri:220 },
  { id:'movie',    name:'Film',        icon:'🎬', room:'Vardagsrum', ct:500, bri:35  },
  { id:'bathday',  name:'Morgon bad',  icon:'🛁', room:'Badrum',     ct:250, bri:200 },
  { id:'bathngt',  name:'Badrum natt', icon:'🌛', room:'Badrum',     ct:500, bri:30  },
  { id:'bedtime',  name:'Sovdags',     icon:'💤', room:'Sovrum',     ct:500, bri:20  },
];

async function api(method, path, body) {
  const r = await fetch(`http://${BRIDGE}/api/${KEY}${path}`, {
    method,
    headers: {'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

async function refreshAll() {
  setStatus(null,'Uppdaterar…');
  try {
    const [lData, gData, sData] = await Promise.all([
      api('GET','/lights'),
      api('GET','/groups'),
      api('GET','/scenes'),
    ]);
    if (Array.isArray(lData)) throw new Error(lData[0]?.error?.description || 'API-fel');
    lights = lData;
    bridgeGroups = gData;
    bridgeScenes = sData;
    const on = Object.values(lights).filter(l=>l.state.on).length;
    setStatus(true,`${Object.keys(lights).length} lampor · ${on} tända`);
    renderTab();
  } catch(e) {
    setStatus(false,'Fel: '+e.message);
    document.getElementById('content').innerHTML=`<div class="empty">❌ ${e.message}<br><small>Tryck ⚙ för inställningar</small></div>`;
  }
}

async function setLight(id, body) {
  try {
    await api('PUT',`/lights/${id}/state`, body);
    Object.assign(lights[id].state, body);
    renderTab();
  } catch(e) { setStatus(false,'Fel: '+e.message); }
}

async function setRoom(name, body) {
  const ids = (ROOMS[name]?.lights||[]).filter(id=>lights[id]);
  try {
    await Promise.all(ids.map(id=>api('PUT',`/lights/${id}/state`,body)));
    ids.forEach(id=>Object.assign(lights[id].state,body));
    renderTab();
  } catch(e) { setStatus(false,'Fel: '+e.message); }
}

async function activateHueScene(sceneId) {
  const sc = bridgeScenes[sceneId];
  if (!sc) return;
  const groupId = Object.keys(bridgeGroups).find(id=>bridgeGroups[id].name===sc.group);
  try {
    if (groupId) {
      await api('PUT',`/groups/${groupId}/action`,{scene:sceneId});
    } else {
      await api('PUT',`/groups/0/action`,{scene:sceneId});
    }
    setStatus(true,`"${sc.name}" aktiverad`);
    setTimeout(refreshAll, 800);
  } catch(e) { setStatus(false,'Fel: '+e.message); }
}

function getScenesForRoom(roomName) {
  const roomLightIds = new Set(ROOMS[roomName]?.lights || []);
  return Object.entries(bridgeScenes)
    .filter(([,sc]) => {
      if (!sc.lights || sc.lights.length === 0) return false;
      return sc.lights.some(lid => roomLightIds.has(lid));
    })
    .map(([id, sc]) => ({ id, name: sc.name }))
    .sort((a,b) => a.name.localeCompare(b.name));
}

function openRoomColorModal(roomName) {
  modalRoomName = roomName;
  modalLightId = null;
  const valid = (ROOMS[roomName]?.lights||[]).filter(id=>lights[id]);
  const avgBri = valid.length ? Math.round(valid.reduce((s,id)=>s+(lights[id].state.bri||1),0)/valid.length) : 200;
  const avgCt = valid.length ? Math.round(valid.reduce((s,id)=>s+(lights[id].state.ct||300),0)/valid.length) : 300;
  document.getElementById('modal-name').textContent = roomName + ' — Färg & ljus';
  document.getElementById('mbri').value = avgBri;
  document.getElementById('mbri-v').textContent = Math.round(avgBri/254*100)+'%';
  document.getElementById('mct').value = avgCt;
  ctLabel(avgCt);
  document.getElementById('cmodal').classList.add('open');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}

function renderTab() {
  const c = document.getElementById('content');
  if      (currentTab==='lights') c.innerHTML = renderLights();
  else if (currentTab==='groups') c.innerHTML = renderGroups();
  else                            c.innerHTML = renderScenes();
}

function renderLights() {
  const ids = Object.keys(lights).sort((a,b)=>+a-+b);
  return ids.map(id => {
    const l=lights[id], s=l.state;
    const on=s.on, reach=s.reachable!==false;
    const bri=s.bri||1, pct=Math.round(bri/254*100);
    const isPlug = l.type==='On/Off plug-in unit'||l.type==='Dimmable light';
    const bg = on&&reach ? lightColor(s) : 'var(--surface3)';
    const icon = !reach ? '⚠️' : on ? '💡' : '○';
    return `<div class="light-card ${on?'is-on':''} ${!reach?'unreachable':''}">
      <div class="light-row">
        <div class="light-dot" style="background:${bg}">${on&&reach?'':'<span style="color:var(--text3);font-size:13px">${icon}</span>'}</div>
        <div class="light-info">
          <div class="light-name">${l.name}</div>
          <div class="light-sub">${!reach?'Ej nåbar':on?pct+'% ljusstyrka':'Av'}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${on?'checked':''} onchange="setLight('${id}',{on:this.checked})">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      ${on&&!isPlug?`
      <div class="bri-row">
        <span class="bri-icon">☀</span>
        <input type="range" min="1" max="254" value="${bri}"
          oninput="setLight('${id}',{bri:+this.value})"
          style="background:linear-gradient(to right,var(--accent) ${pct}%,var(--surface3) ${pct}%)">
        <span class="bri-pct">${pct}%</span>
      </div>
      <div class="color-row">
        ${PRESETS.slice(0,6).map((p,i)=>`<div class="cswatch" style="background:${p.hex}" onclick="applyPreset('${id}',${i})" title="${p.name}"></div>`).join('')}
        <div class="cswatch" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)" onclick="openModal('${id}')"></div>
      </div>`:''}
    </div>`;
  }).join('');
}

function renderGroups() {
  return Object.entries(ROOMS).map(([name,g])=>{
    const valid=g.lights.filter(id=>lights[id]);
    const onC=valid.filter(id=>lights[id].state.on).length;
    const avgBri = valid.length ? Math.round(valid.reduce((s,id)=>s+(lights[id].state.bri||1),0)/valid.length) : 1;
    const briPct = Math.round(avgBri/254*100);
    const roomScenes = getScenesForRoom(name);
    return `<div class="group-card ${onC>0?'on':''}">
      <div class="group-header" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="group-emoji">${g.icon}</div>
        <div class="group-info">
          <div class="group-name">${name}</div>
          <div class="group-sub">${valid.length} lampor · ${onC} tända</div>
        </div>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" ${onC>0?'checked':''} onchange="setRoom('${name}',{on:this.checked})">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="group-chevron">▼</span>
      </div>
      <div class="group-body">
        <div class="group-bri-row">
          <span class="bri-icon">☀</span>
          <input type="range" min="1" max="254" value="${avgBri}"
            oninput="setRoom('${name}',{bri:+this.value})"
            style="background:linear-gradient(to right,var(--accent) ${briPct}%,var(--surface3) ${briPct}%)">
          <span class="bri-pct">${briPct}%</span>
          <div class="cswatch" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);width:26px;height:26px;flex-shrink:0" onclick="openRoomColorModal('${name}')"></div>
        </div>
        ${roomScenes.length ? `<div class="group-scenes">
          ${roomScenes.map(sc=>`
            <div class="group-scene-btn" onclick="activateHueScene('${sc.id}')">
              <span class="group-scene-name">${sc.name}</span>
            </div>`).join('')}
        </div>` : '<div style="font-size:12px;color:var(--text3);padding:4px 0">Inga scener hittades</div>'}
      </div>
    </div>`;
  }).join('');
}

function renderScenes() {
  return `<div class="scene-grid">${SCENES.map(sc=>`
    <div class="scene-card" onclick='activateScene(${JSON.stringify(sc)})'>
      <div class="scene-icon">${sc.icon}</div>
      <div class="scene-name">${sc.name}</div>
      <div class="scene-room">${sc.room}</div>
    </div>`).join('')}</div>`;
}

function lightColor(s) {
  if (s.colormode==='ct'&&s.ct) {
    const t=(s.ct-153)/347;
    return `rgba(${Math.round(255-t*80)},${Math.round(220-t*50)},${Math.round(180+t*40)},0.9)`;
  }
  if (s.xy) {
    const [x,y]=s.xy,z=1-x-y,Y=0.6,X=(Y/y)*x,Z=(Y/y)*z;
    let r=X*1.656492-Y*0.354851-Z*0.255038;
    let g=-X*0.707196+Y*1.655397+Z*0.036152;
    let b=X*0.051713-Y*0.121364+Z*1.011530;
    const m=Math.max(r,g,b,1);
    return `rgba(${Math.round(r/m*255)},${Math.round(Math.max(0,g/m*255))},${Math.round(Math.max(0,b/m*255))},0.9)`;
  }
  return 'rgba(240,165,0,0.9)';
}

function applyPreset(id,i) {
  const p=PRESETS[i],b={on:true};
  if(p.ct)b.ct=p.ct; else b.xy=p.xy;
  setLight(id,b);
}

function openModal(id) {
  modalLightId=id;
  modalRoomName=null;
  const s=lights[id].state;
  document.getElementById('modal-name').textContent=lights[id].name;
  document.getElementById('mbri').value=s.bri||200;
  document.getElementById('mbri-v').textContent=Math.round((s.bri||200)/254*100)+'%';
  document.getElementById('mct').value=s.ct||300;
  ctLabel(s.ct||300);
  document.getElementById('cmodal').classList.add('open');
}
function closeModal(){ document.getElementById('cmodal').classList.remove('open'); }
function mPickColor(i){
  document.querySelectorAll('.hswatch').forEach((s,j)=>s.classList.toggle('sel',i===j));
  const p=PRESETS[i],b={on:true};
  if(p.ct)b.ct=p.ct; else b.xy=p.xy;
  if(modalLightId) setLight(modalLightId,b);
  else if(modalRoomName) setRoom(modalRoomName,b);
}
function mBri(v){
  document.getElementById('mbri-v').textContent=Math.round(v/254*100)+'%';
  if(modalLightId) setLight(modalLightId,{bri:+v});
  else if(modalRoomName) setRoom(modalRoomName,{bri:+v});
}
function mCt(v){
  ctLabel(+v);
  if(modalLightId) setLight(modalLightId,{ct:+v,colormode:'ct'});
  else if(modalRoomName) setRoom(modalRoomName,{ct:+v,colormode:'ct'});
}
function ctLabel(ct){ document.getElementById('mct-v').textContent=ct<200?'Kall':ct<320?'Neutral':ct<420?'Varm':'Glöd'; }

function setStatus(ok,msg){
  document.getElementById('stext').textContent=msg;
  document.getElementById('sdot').className='sdot'+(ok===false?' err':ok===null?' warn':'');
}

function openSettings(){
  const ip=prompt('Bryggans IP:',BRIDGE); if(!ip)return;
  const key=prompt('API-nyckel:',KEY); if(!key)return;
  BRIDGE=ip; KEY=key;
  localStorage.setItem('hue_ip',ip); localStorage.setItem('hue_key',key);
  refreshAll();
}

document.getElementById('hswatches').innerHTML=PRESETS.map((p,i)=>
  `<div class="hswatch" style="background:${p.hex}" onclick="mPickColor(${i})" title="${p.name}"></div>`
).join('');

refreshAll();
</script>
</body>
</html>
